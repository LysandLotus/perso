<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — Lys &amp; Lotus</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,560;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b0e14;
    --bg-soft:#10141d;
    --card:#141925;
    --card-hover:#19202e;
    --line:#232c3d;
    --ink:#ece8df;        /* warm parchment */
    --muted:#8b93a7;
    --faint:#5d6679;
    --gold:#c8a96a;       /* single accent: muted lotus-gold */
    --gold-dim:#9b834f;
    --radius:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(200,169,106,.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(200,169,106,.04), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    line-height:1.5;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1020px;margin:0 auto;padding:clamp(2.2rem,6vw,4.5rem) clamp(1.1rem,4vw,2rem) 4rem}

  /* ---- header ---- */
  .eyebrow{
    font-family:"JetBrains Mono",monospace;
    font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);margin:0 0 1rem;
    display:flex;align-items:center;gap:.7rem;
  }
  .eyebrow::before{content:"";width:26px;height:1px;background:var(--gold-dim)}
  h1{
    font-family:"Fraunces",Georgia,serif;
    font-weight:560;font-size:clamp(2.6rem,7vw,4rem);
    line-height:1.02;letter-spacing:-.01em;margin:0;
  }
  h1 em{font-style:italic;color:var(--gold);font-weight:400}
  .sub{color:var(--muted);margin:.9rem 0 0;max-width:52ch;font-size:1rem}

  /* ---- controls ---- */
  .bar{
    display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
    margin:2.4rem 0 1.6rem;
  }
  .search{
    flex:1;min-width:220px;position:relative;
  }
  .search input{
    width:100%;background:var(--bg-soft);border:1px solid var(--line);
    color:var(--ink);border-radius:11px;padding:.72rem .95rem .72rem 2.4rem;
    font-family:"JetBrains Mono",monospace;font-size:.86rem;outline:none;
    transition:border-color .18s,box-shadow .18s;
  }
  .search input::placeholder{color:var(--faint)}
  .search input:focus{border-color:var(--gold-dim);box-shadow:0 0 0 3px rgba(200,169,106,.12)}
  .search svg{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--faint)}
  .count{font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--faint);white-space:nowrap}

  /* ---- grid ---- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}

  .card{
    position:relative;display:block;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:1.15rem 1.25rem 1.15rem 1.5rem;overflow:hidden;
    transition:background .2s,border-color .2s,transform .2s;
    animation:rise .5s both;animation-delay:calc(var(--i,0)*55ms);
  }
  .card::before{ /* the spine */
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:var(--gold-dim);opacity:.5;transition:opacity .2s,box-shadow .2s;
  }
  .card:hover{background:var(--card-hover);border-color:#2e3a50;transform:translateY(-2px)}
  .card:hover::before{opacity:1;box-shadow:0 0 14px rgba(200,169,106,.5)}
  .card:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

  .ref{
    font-family:"JetBrains Mono",monospace;font-size:.7rem;letter-spacing:.08em;
    color:var(--gold);opacity:.85;
  }
  .tag{
    font-family:"JetBrains Mono",monospace;font-size:.62rem;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);
    border:1px solid var(--line);border-radius:99px;padding:.12rem .5rem;
  }
  .card-top{display:flex;justify-content:space-between;align-items:center;gap:.6rem;margin-bottom:.7rem}
  .title{font-family:"Fraunces",Georgia,serif;font-size:1.22rem;font-weight:560;line-height:1.15;margin:0}
  .desc{color:var(--muted);font-size:.85rem;margin:.35rem 0 0}
  .file{font-family:"JetBrains Mono",monospace;font-size:.72rem;color:var(--faint);margin-top:.85rem;display:flex;align-items:center;gap:.4rem}
  .arrow{margin-left:auto;color:var(--faint);transition:transform .2s,color .2s}
  .card:hover .arrow{transform:translateX(3px);color:var(--gold)}

  /* ---- states ---- */
  .note{font-family:"JetBrains Mono",monospace;font-size:.78rem;color:var(--faint);padding:1.5rem 0;text-align:center}
  .empty{border:1px dashed var(--line);border-radius:var(--radius);padding:2.5rem 1rem;text-align:center;color:var(--muted)}
  footer{margin-top:3rem;padding-top:1.4rem;border-top:1px solid var(--line);
    font-family:"JetBrains Mono",monospace;font-size:.72rem;color:var(--faint);
    display:flex;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  footer a{color:var(--gold-dim);text-decoration:none}
  footer a:hover{color:var(--gold)}

  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion:reduce){
    .card{animation:none}
    *{transition:none!important}
  }
</style>
</head>
<body>
<main class="wrap">
  <p class="eyebrow">Lys &amp; Lotus · Atelier</p>
  <h1>The <em>cabinet</em></h1>
  <p class="sub">Personal tools, simulators and experiments. Pick one to open it.</p>

  <div class="bar">
    <label class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="search" placeholder="filter tools…" autocomplete="off" aria-label="Filter tools" />
    </label>
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="grid"></div>
  <p class="note" id="note">Loading the cabinet…</p>

  <footer>
    <span id="source">auto-listed from the repository</span>
    <a id="repolink" href="#" target="_blank" rel="noopener">view repo ↗</a>
  </footer>
</main>

<script>
/* ============================================================
   CONFIG — set your repo name once, here.
   ============================================================ */
const CONFIG = {
  owner : "LysandLotus",      // your GitHub user/org
  repo  : "perso",   // <-- CHANGE THIS to the repo holding the html files
  branch: "main",             // "main" or "master"
  path  : ""                  // subfolder if any (e.g. "tools"), else leave ""
};

/* Optional nice labels. Any file not listed here still appears,
   with a title auto-generated from its filename. */
const META = {
  "civilization_index.html":        { tag:"Reference", desc:"Civilization browser / index." },
  "cours_tokenisation_claude_fr.html":{ tag:"Cours", desc:"Cours sur la tokenisation (FR)." },
  "mr_puzzle_jigsaw.html":          { tag:"Game", desc:"Jigsaw puzzle game." },
  "rsi-watch.html":                 { tag:"Finance", desc:"RSI monitor / market watch." },
  "wealth_simulator_v2.html":       { tag:"Finance", desc:"Wealth projection — v2." },
  "wealth_simulator_v3.html":       { tag:"Finance", desc:"Wealth projection — latest." }
};

/* Fallback list, used only if the GitHub API can't be reached. */
const FALLBACK = Object.keys(META);

/* ---------- helpers ---------- */
function prettify(file){
  let n = file.replace(/\.html?$/i,"").replace(/[_-]+/g," ").trim();
  n = n.replace(/\bclaude\b/gi,"").replace(/\s+/g," ").trim();
  return n.split(" ").map(w=>{
    if(/^v\d+$/i.test(w)) return w.toLowerCase();
    if(/^(rsi|seo|fr|en|api|gtm|ui|kpi)$/i.test(w)) return w.toUpperCase();
    return w.charAt(0).toUpperCase()+w.slice(1);
  }).join(" ");
}

async function listFiles(){
  const base = `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`;
  const url  = `${base}?ref=${encodeURIComponent(CONFIG.branch)}`;
  const res  = await fetch(url, { headers:{ "Accept":"application/vnd.github+json" }});
  if(!res.ok) throw new Error("GitHub API "+res.status);
  const data = await res.json();
  return data
    .filter(f => f.type === "file" && /\.html?$/i.test(f.name) && f.name.toLowerCase() !== "index.html")
    .map(f => f.name)
    .sort((a,b)=>a.localeCompare(b));
}

function cardHTML(file, i){
  const m = META[file] || {};
  const title = m.title || prettify(file);
  const tag = m.tag ? `<span class="tag">${m.tag}</span>` : "";
  const desc = m.desc ? `<p class="desc">${m.desc}</p>` : "";
  const ref = "LL·" + String(i+1).padStart(2,"0");
  const href = "./" + encodeURI(file);
  return `<a class="card" href="${href}" style="--i:${i}" data-key="${(file+' '+title+' '+(m.tag||'')).toLowerCase()}">
    <div class="card-top"><span class="ref">${ref}</span>${tag}</div>
    <h2 class="title">${title}</h2>${desc}
    <div class="file">${file}<span class="arrow">→</span></div>
  </a>`;
}

function render(files, fromApi){
  const grid = document.getElementById("grid");
  const note = document.getElementById("note");
  const count = document.getElementById("count");

  if(!files.length){
    grid.innerHTML = `<div class="empty">No HTML tools found in this folder yet.</div>`;
    note.style.display = "none";
    count.textContent = "0 tools";
    return;
  }
  grid.innerHTML = files.map(cardHTML).join("");
  count.textContent = files.length + (files.length===1?" tool":" tools");
  note.style.display = "none";
  document.getElementById("source").textContent =
    fromApi ? "auto-listed from GitHub · live" : "showing the built-in fallback list";

  // search filter
  const q = document.getElementById("q");
  q.addEventListener("input", () => {
    const term = q.value.trim().toLowerCase();
    let shown = 0;
    grid.querySelectorAll(".card").forEach(c=>{
      const hit = !term || c.dataset.key.includes(term);
      c.style.display = hit ? "" : "none";
      if(hit) shown++;
    });
    count.textContent = shown + (shown===1?" tool":" tools");
  });
}

/* repo link in footer */
document.getElementById("repolink").href =
  `https://github.com/${CONFIG.owner}/${CONFIG.repo}`;

(async () => {
  try{
    const files = await listFiles();
    render(files, true);
  }catch(err){
    console.warn("Falling back to static list:", err.message);
    render(FALLBACK, false);
  }
})();
</script>
</body>
</html>

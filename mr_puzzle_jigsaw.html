<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Mr_Puzzle — Tiger Jigsaw</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#141414;display:flex;flex-direction:column;align-items:center;height:100vh;overflow:hidden;font-family:Georgia,serif;color:#ccc}
#hdr{display:flex;align-items:center;justify-content:space-between;width:760px;padding:10px 0 8px;flex-shrink:0}
#brand{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#666}
#stats{display:flex;gap:20px}
.st{text-align:center}.st-v{font-size:20px;font-weight:bold;color:#c8832a}.st-l{font-size:9px;color:#555;letter-spacing:.1em;text-transform:uppercase}
#btn{padding:7px 18px;background:#c8832a;border:none;border-radius:3px;color:#111;font-size:12px;font-weight:bold;letter-spacing:.1em;cursor:pointer;text-transform:uppercase}
#btn:hover{background:#e8a030}
#arena{display:flex;gap:14px;align-items:flex-start}
#board-wrap{position:relative;flex-shrink:0}
#board-canvas{display:block;border-radius:4px;cursor:pointer}
#tray-wrap{width:340px;height:580px;overflow:hidden;position:relative;flex-shrink:0;border-radius:4px}
#tray-inner{position:absolute;top:0;left:0;right:0}
#win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);align-items:center;justify-content:center;z-index:99}
#win-box{background:#1e1e1e;border:1px solid #c8832a;border-radius:8px;padding:30px 40px;text-align:center}
#win-box h2{color:#c8832a;font-size:24px;letter-spacing:.15em;margin-bottom:8px}
#win-box p{color:#888;font-size:14px;margin-bottom:20px}
#win-box button{padding:10px 28px;background:#c8832a;border:none;border-radius:3px;color:#111;font-size:13px;font-weight:bold;cursor:pointer;text-transform:uppercase;letter-spacing:.1em}
#hint{font-size:11px;color:#444;text-align:center;margin-top:6px;letter-spacing:.04em}
</style>
</head>

</div>

    bottom:r===ROWS-1 ?0: hedges[r][c],
    left:  c===0      ?0:-vedges[r][c-1],
    right: c===COLS-1 ?0: vedges[r][c],
  };
}

// ── JIGSAW PATH ──────────────────────────────────
function jigsawEdge(ctx,x1,y1,x2,y2,type){
  if(type===0){ctx.lineTo(x2,y2);return;}
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  const ux=dx/len,uy=dy/len,nx=uy*type,ny=-ux*type,t=TAB*.82;
  ctx.lineTo(x1+ux*len*.3,y1+uy*len*.3);
  ctx.bezierCurveTo(x1+ux*len*.3+nx*t*.45,y1+uy*len*.3+ny*t*.45,x1+ux*len*.4+nx*t,y1+uy*len*.4+ny*t,x1+ux*len*.5+nx*t,y1+uy*len*.5+ny*t);
  ctx.bezierCurveTo(x1+ux*len*.6+nx*t,y1+uy*len*.6+ny*t,x1+ux*len*.7+nx*t*.45,y1+uy*len*.7+ny*t*.45,x1+ux*len*.7,y1+uy*len*.7);
  ctx.lineTo(x2,y2);
}
function jigsawPath(ctx,edges,ox,oy){
  const x=ox+TAB,y=oy+TAB;
  ctx.beginPath();ctx.moveTo(x,y);
  jigsawEdge(ctx,x,y,x+PW,y,edges.top);
  jigsawEdge(ctx,x+PW,y,x+PW,y+PH,edges.right);
  jigsawEdge(ctx,x+PW,y+PH,x,y+PH,edges.bottom);
  jigsawEdge(ctx,x,y+PH,x,y,edges.left);
  ctx.closePath();
}

// ── PIECE CANVAS ─────────────────────────────────
function makePieceCanvas(r,c,edges,img){
  const oc=document.createElement('canvas');
  oc.width=CPW;oc.height=CPH;
  const ctx=oc.getContext('2d');
  jigsawPath(ctx,edges,0,0);
  ctx.save();ctx.clip();
  ctx.drawImage(img,-c*PW+TAB,-r*PH+TAB,BOARD_W,BOARD_H);
  ctx.restore();
  jigsawPath(ctx,edges,0,0);
  ctx.strokeStyle='rgba(0,0,0,.65)';ctx.lineWidth=1.5;ctx.stroke();
  return oc;
}

// ── TRAY ─────────────────────────────────────────
const TRAY_COLS=3,TRAY_GAP=6;
const TRAY_SCALE=0.78;
const TRAY_PW=Math.round(CPW*TRAY_SCALE),TRAY_PH=Math.round(CPH*TRAY_SCALE);

function buildTray(){
  trayInner.innerHTML='';
  const shuffled=[...pieces];
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  const rows=Math.ceil(N/TRAY_COLS);
  trayInner.style.height=(rows*(TRAY_PH+TRAY_GAP))+'px';
  shuffled.forEach((p,i)=>{
    const tc=i%TRAY_COLS,tr=Math.floor(i/TRAY_COLS);
    const wrap=document.createElement('div');
    wrap.style.cssText=`position:absolute;left:${tc*(TRAY_PW+TRAY_GAP)}px;top:${tr*(TRAY_PH+TRAY_GAP)}px;width:${TRAY_PW}px;height:${TRAY_PH}px;cursor:grab`;
    const sc=document.createElement('canvas');
    sc.width=TRAY_PW;sc.height=TRAY_PH;
    const sctx=sc.getContext('2d');
    sctx.scale(TRAY_SCALE,TRAY_SCALE);
    sctx.drawImage(p.canvas,0,0);
    wrap.appendChild(sc);
    wrap.dataset.idx=p.idx;
    wrap.addEventListener('mousedown',trayMouseDown);
    trayInner.appendChild(wrap);
    p.trayEl=wrap;
  });
}

// ── BOARD GRID ───────────────────────────────────
function initGrid(){boardGrid=Array.from({length:ROWS},()=>Array(COLS).fill(null));}

function placePieceAt(piece,r,c){
  // Remove from old board position if any
  if(piece.boardR!==null)boardGrid[piece.boardR][piece.boardC]=null;

  // If target occupied → send occupant back to tray
  const occupant=boardGrid[r][c];
  if(occupant&&occupant!==piece){
    occupant.boardR=null;occupant.boardC=null;
    if(occupant.trayEl)occupant.trayEl.style.display='';
  }

  // Place
  boardGrid[r][c]=piece;
  piece.boardR=r;piece.boardC=c;
  if(piece.trayEl)piece.trayEl.style.display='none';

  if(!startTime&&!won){startTime=Date.now();timerID=setInterval(tick,1000);}
  updateStats();
  drawBoard();
}

function removePieceFromBoard(piece){
  if(piece.boardR===null)return;
  boardGrid[piece.boardR][piece.boardC]=null;
  piece.boardR=null;piece.boardC=null;
  drawBoard();
}

function countCorrect(){
  return pieces.filter(p=>p.boardR===p.row&&p.boardC===p.col).length;
}
function updateStats(){
  const c=countCorrect();
  document.getElementById('mv').textContent=c;
  document.getElementById('pct').textContent=Math.round(c/N*100)+'%';
  if(c===N&&!won)setTimeout(checkWin,300);
}

// ── DRAW BOARD ───────────────────────────────────
function drawBoard(){
  bctx.clearRect(0,0,BOARD_W,BOARD_H);
  bctx.fillStyle='#0e0e0e';bctx.fillRect(0,0,BOARD_W,BOARD_H);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const p=boardGrid[r][c];
    if(!p){
      // Ghost slot
      bctx.save();
      jigsawPath(bctx,pieces[r*COLS+c].edges,-TAB,-TAB);
      bctx.save();bctx.clip();bctx.globalAlpha=.07;
      bctx.drawImage(pieces[r*COLS+c].canvas,-TAB,-TAB+r*0,-c*0,CPW,CPH);
      // Actually draw image reference
      const img=pieces[r*COLS+c].canvas;
      bctx.save();bctx.translate(c*PW-TAB,r*PH-TAB);bctx.drawImage(img,0,0);bctx.restore();
      bctx.restore();
      jigsawPath(bctx,pieces[r*COLS+c].edges,-TAB,-TAB);
      bctx.strokeStyle='rgba(255,255,255,.13)';bctx.lineWidth=1;bctx.stroke();
      bctx.restore();
    } else {
      // Placed piece — highlight if correct
      const isCorrect=(p.row===r&&p.col===c);
      bctx.save();
      bctx.translate(c*PW-TAB,r*PH-TAB);
      bctx.drawImage(p.canvas,0,0);
      if(!isCorrect){
        // subtle wrong-position tint
        jigsawPath(bctx,p.edges,0,0);
        bctx.fillStyle='rgba(180,60,60,.08)';bctx.fill();
        bctx.strokeStyle='rgba(200,80,80,.35)';bctx.lineWidth=1.5;bctx.stroke();
      } else {
        jigsawPath(bctx,p.edges,0,0);
        bctx.strokeStyle='rgba(200,131,42,.5)';bctx.lineWidth=1.5;bctx.stroke();
      }
      bctx.restore();
    }
  }
}

// ── DRAG FROM TRAY ───────────────────────────────
function trayMouseDown(e){
  e.preventDefault();
  const p=pieces[+e.currentTarget.dataset.idx];
  startDrag(p,e.clientX,e.clientY,false);
}

// ── DRAG FROM BOARD ──────────────────────────────
boardCanvas.addEventListener('mousedown',e=>{
  const rect=boardCanvas.getBoundingClientRect();
  const rx=e.clientX-rect.left,ry=e.clientY-rect.top;
  const c=Math.min(COLS-1,Math.max(0,Math.floor(rx/PW)));
  const r=Math.min(ROWS-1,Math.max(0,Math.floor(ry/PH)));
  const p=boardGrid[r][c];
  if(!p)return;
  removePieceFromBoard(p);
  startDrag(p,e.clientX,e.clientY,true);
});

function startDrag(p,cx,cy,fromBoard){
  dragPiece=p;dragFromBoard=fromBoard;
  dragEl=document.createElement('canvas');
  dragEl.width=CPW;dragEl.height=CPH;
  dragEl.getContext('2d').drawImage(p.canvas,0,0);
  dragEl.style.cssText='position:fixed;pointer-events:none;z-index:50;opacity:.9;cursor:grabbing;filter:drop-shadow(0 4px 12px rgba(0,0,0,.6))';
  document.body.appendChild(dragEl);
  moveDragEl(cx,cy);
  if(!startTime&&!won){startTime=Date.now();timerID=setInterval(tick,1000);}
  document.addEventListener('mousemove',onDragMove);
  document.addEventListener('mouseup',onDragUp);
}

function moveDragEl(cx,cy){
  dragEl.style.left=(cx-CPW/2)+'px';
  dragEl.style.top=(cy-CPH/2)+'px';
}
function onDragMove(e){if(dragEl)moveDragEl(e.clientX,e.clientY);}

function onDragUp(e){
  document.removeEventListener('mousemove',onDragMove);
  document.removeEventListener('mouseup',onDragUp);
  if(!dragEl||!dragPiece){cleanup();return;}

  const rect=boardCanvas.getBoundingClientRect();
  const rx=e.clientX-rect.left,ry=e.clientY-rect.top;

  if(rx>=0&&rx<BOARD_W&&ry>=0&&ry<BOARD_H){
    // Snap to nearest cell
    const c=Math.min(COLS-1,Math.max(0,Math.floor(rx/PW)));
    const r=Math.min(ROWS-1,Math.max(0,Math.floor(ry/PH)));
    placePieceAt(dragPiece,r,c);
  } else {
    // Dropped outside board → return to tray
    if(dragPiece.boardR!==null){
      boardGrid[dragPiece.boardR][dragPiece.boardC]=null;
      dragPiece.boardR=null;dragPiece.boardC=null;
    }
    if(dragPiece.trayEl)dragPiece.trayEl.style.display='';
    drawBoard();
    updateStats();
  }
  cleanup();
}
function cleanup(){
  if(dragEl){dragEl.remove();dragEl=null;}
  dragPiece=null;
}

// ── TIMER ────────────────────────────────────────
function tick(){
  const s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('tm').textContent=Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
}
function checkWin(){
  if(countCorrect()<N)return;
  won=true;clearInterval(timerID);
  const s=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('win-txt').textContent='All 25 pieces correct · '+Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
  document.getElementById('win').style.display='flex';
}

// ── TRAY SCROLL ──────────────────────────────────
let trayScroll=0;
trayWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const max=Math.max(0,trayInner.offsetHeight-trayWrap.offsetHeight);
  trayScroll=Math.max(0,Math.min(max,trayScroll+e.deltaY*.5));
  trayInner.style.top=(-trayScroll)+'px';
},{passive:false});

// ── NEW GAME ─────────────────────────────────────
function newGame(){
  won=false;startTime=null;trayScroll=0;
  clearInterval(timerID);
  trayInner.style.top='0';
  document.getElementById('mv').textContent='0';
  document.getElementById('tm').textContent='0:00';
  document.getElementById('pct').textContent='0%';
  document.getElementById('win').style.display='none';
  genEdges();initGrid();pieces=[];
  const img=new Image();
  img.onload=()=>{
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const e=pEdges(r,c);
      pieces.push({idx:r*COLS+c,row:r,col:c,edges:e,canvas:makePieceCanvas(r,c,e,img),boardR:null,boardC:null,trayEl:null});
    }
    buildTray();drawBoard();
  };
  img.src=IMG_SRC;
}
document.getElementById('btn').addEventListener('click',newGame);
newGame();
</script>
